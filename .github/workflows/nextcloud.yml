name: build nextcloud

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - nextcloud/**
      - .github/workflows/nextcloud.yml

permissions:
  contents: read
  packages: write

jobs:
  push:
    name: "dockerfiles:nextcloud_${{ matrix.tag }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag:
          - production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - id: lower-owner
        name: Repository owner to lowercase
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./nextcloud
          file: ./nextcloud/${{ matrix.tag }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.lower-owner.outputs.owner }}/dockerfiles:nextcloud_${{ matrix.tag }}
            ghcr.io/${{ steps.lower-owner.outputs.owner }}/dockerfiles:nextcloud_8.4
            ghcr.io/${{ steps.lower-owner.outputs.owner }}/dockerfiles:nextcloud_${{ github.sha }}
          cache-from: type=gha,scope=nextcloud-${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=nextcloud-${{ matrix.tag }}
