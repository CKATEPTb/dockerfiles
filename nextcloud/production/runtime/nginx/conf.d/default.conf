server {
	listen 8080;
	server_name _;
	root /home/container/www;
	index index.php index.html /index.php$request_uri;
	charset utf-8;
	absolute_redirect off;
	port_in_redirect off;

	include /home/container/nginx/snippets/security-headers.conf;
	fastcgi_hide_header X-Powered-By;
	add_header X-Request-ID $request_id always;

	client_max_body_size 10G;
	client_body_timeout 3600s;
	client_body_buffer_size 512k;
	fastcgi_buffers 64 4K;

	location = / {
		if ($http_user_agent ~ ^DavClnt) {
			return 302 /remote.php/webdav/$is_args$args;
		}
	}

	location = /robots.txt {
		allow all;
		log_not_found off;
		access_log off;
	}

	location ^~ /.well-known {
		location = /.well-known/carddav { return 301 /remote.php/dav/; }
		location = /.well-known/caldav  { return 301 /remote.php/dav/; }
		location /.well-known/acme-challenge { try_files $uri $uri/ =404; }
		location /.well-known/pki-validation { try_files $uri $uri/ =404; }
		return 301 /index.php$request_uri;
	}

	location = /whiteboard {
		return 301 /whiteboard/;
	}

	location ^~ /whiteboard/ {
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Host $host;
		proxy_pass http://127.0.0.1:3002/;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_read_timeout 3600s;
		proxy_send_timeout 3600s;
	}

	location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)(?:$|/) {
		return 404;
	}

	location ~ ^/(?:\.|autotest|occ|issue|indie|db_|console) {
		return 404;
	}

	location ~ ^/(?:composer\.(?:json|lock)|package(?:-lock)?\.json|core/shipped\.json)$ {
		return 404;
	}

	location ~ \.php(?:$|/) {
		rewrite ^/(?!index|remote|public|cron|core/ajax/update|status|ocs/v[12]|updater/.+|oc[ms]-provider/.+|.+/richdocumentscode(_arm64)?/proxy) /index.php$request_uri;
		fastcgi_split_path_info ^(.+?\.php)(/.*)$;
		set $path_info $fastcgi_path_info;
		try_files $fastcgi_script_name =404;

		include /home/container/nginx/fastcgi_params;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		fastcgi_param PATH_INFO $path_info;
		fastcgi_param HTTPS $fastcgi_https;
		fastcgi_param HTTP_HOST $nextcloud_http_host;
		fastcgi_param HTTP_X_REQUEST_ID $request_id;
		fastcgi_param modHeadersAvailable true;
		fastcgi_param front_controller_active true;
		fastcgi_pass unix:/home/container/tmp/php-fpm.sock;
		fastcgi_intercept_errors on;
		fastcgi_request_buffering on;
		fastcgi_max_temp_file_size 0;
		fastcgi_connect_timeout 60s;
		fastcgi_send_timeout 3600s;
		fastcgi_read_timeout 3600s;
	}

	location ~ \.(?:css|js|mjs|svg|gif|ico|jpg|jpeg|png|webp|wasm|tflite|map|ogg|flac|mp4|webm)$ {
		try_files $uri /index.php$request_uri;
		add_header Cache-Control "public, max-age=15778463$asset_immutable";
		include /home/container/nginx/snippets/security-headers.conf;
		access_log off;
	}

	location ~ \.(?:otf|woff2?)$ {
		try_files $uri /index.php$request_uri;
		expires 7d;
		include /home/container/nginx/snippets/security-headers.conf;
		access_log off;
	}

	location /remote {
		return 301 /remote.php$request_uri;
	}

	location / {
		try_files $uri $uri/ /index.php$request_uri;
	}
}
