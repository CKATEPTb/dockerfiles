worker_processes auto;
pid /home/container/tmp/nginx.pid;
error_log /home/container/logs/nginx-error.log warn;
daemon off;

events {
	worker_connections 1024;
	multi_accept on;
}

http {
	include /home/container/nginx/mime.types;
	default_type application/octet-stream;
	types_hash_max_size 4096;
	server_tokens off;

	map $arg_v $asset_immutable {
		""      "";
		default ", immutable";
	}

	map $http_x_forwarded_proto $fastcgi_https {
		default off;
		https   on;
	}

	map $http_referer $log_referer {
		"~^(?<safe_referer>https?://[^?#]*)" $safe_referer;
		default                                "-";
	}

	map $http_host $nextcloud_http_host {
		"~^(?<validated_http_host>(?:[A-Za-z0-9.-]+|\[[0-9A-Fa-f:]+\])(?::[0-9]{1,5})?)$" $validated_http_host;
		default                                                                    $host;
	}

	# Structured access records are consumed by the compact Pterodactyl log stream.
	# Query strings are deliberately excluded so tokens and search terms are not logged.
	log_format nextcloud_json escape=json
		'{"time":"$time_iso8601","request_id":"$request_id","remote_addr":"$remote_addr",'
		'"forwarded_for":"$http_x_forwarded_for","cf_ip":"$http_cf_connecting_ip",'
		'"host":"$nextcloud_http_host","method":"$request_method","uri":"$uri","status":$status,'
		'"bytes":$body_bytes_sent,"duration":$request_time,"referer":"$log_referer",'
		'"user_agent":"$http_user_agent","accept":"$http_accept"}';

	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;
	keepalive_timeout 65;
	reset_timedout_connection on;

	client_body_temp_path /home/container/tmp/client-body;
	fastcgi_temp_path /home/container/tmp/fastcgi;
	proxy_temp_path /home/container/tmp/proxy;
	uwsgi_temp_path /home/container/tmp/uwsgi;
	scgi_temp_path /home/container/tmp/scgi;

	access_log /home/container/logs/nginx-access.log nextcloud_json;

	gzip on;
	gzip_vary on;
	gzip_comp_level 4;
	gzip_min_length 256;
	gzip_proxied expired no-cache no-store private no_last_modified no_etag auth;
	gzip_types application/atom+xml text/javascript application/javascript application/json application/ld+json application/manifest+json application/rss+xml application/vnd.geo+json application/vnd.ms-fontobject application/wasm application/x-font-ttf application/x-web-app-manifest+json application/xhtml+xml application/xml font/opentype image/bmp image/svg+xml image/x-icon text/cache-manifest text/css text/plain text/vcard text/vnd.rim.location.xloc text/vtt text/x-component text/x-cross-domain-policy;

	include /home/container/nginx/conf.d/*.conf;
}
